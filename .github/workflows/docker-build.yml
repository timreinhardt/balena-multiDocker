name: Docker Build Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Python Flask image
        run: docker buildx build --platform linux/arm64 -t python-flask-test .

      - name: Build React demo image
        run: docker buildx build --platform linux/arm64 -t react-demo-test ./react-demo

      - name: Build Express demo image
        run: docker buildx build --platform linux/arm64 -t express-demo-test ./express-demo

      - name: Build C demo image
        run: docker buildx build --platform linux/arm64 -t c-demo-test ./c-demo
