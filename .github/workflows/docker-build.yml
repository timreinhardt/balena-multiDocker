name: Docker Build Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Python Flask image
        run: docker build -t python-flask-test .

      - name: Build React demo image
        run: docker build -t react-demo-test ./react-demo

      - name: Build Express demo image
        run: docker build -t express-demo-test ./express-demo

      - name: Build C demo image
        run: docker build -t c-demo-test ./c-demo
